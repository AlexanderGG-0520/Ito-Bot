apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ito-bot
  namespace: argocd
spec:
  project: REPLACE_WITH_EXISTING_ARGOCD_PROJECT
  source:
    repoURL: REPLACE_WITH_PRIVATE_GITOPS_REPOSITORY_URL
    targetRevision: REPLACE_WITH_EXISTING_GITOPS_BRANCH
    path: REPLACE_WITH_GITOPS_PATH_FOR_ITO_BOT
  destination:
    server: https://kubernetes.default.svc
    namespace: ito-bot
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
