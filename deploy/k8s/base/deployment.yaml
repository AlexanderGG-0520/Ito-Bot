apiVersion: apps/v1
kind: Deployment
metadata:
  name: ito-bot
spec:
  replicas: 1
  strategy:
    type: Recreate
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: ito-bot
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ito-bot
    spec:
      serviceAccountName: ito-bot
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: ito-bot
          image: ghcr.io/alexandergg-0520/ito-bot:sha-REPLACE_WITH_COMMIT_SHA
          imagePullPolicy: IfNotPresent
          ports:
            - name: health
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: ito-bot-config
          env:
            - name: DISCORD_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ito-bot-secrets
                  key: DISCORD_TOKEN
            - name: DISCORD_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: ito-bot-secrets
                  key: DISCORD_CLIENT_ID
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ['ALL']
          startupProbe:
            httpGet:
              path: /healthz
              port: health
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
      volumes:
        - name: tmp
          emptyDir: {}
